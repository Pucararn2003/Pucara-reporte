const logEl = document.getElementById('log');
function log(msg, cls='') { logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`; logEl.scrollTop = 9999; }

async function importar() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  logEl.innerHTML = '';

  // Verify session
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    log('❌ No hay sesión activa. Abre primero inventario.html e inicia sesión.', 'err');
    btn.disabled = false;
    return;
  }
  log(`✓ Sesión activa: ${session.user.email}`, 'ok');

  // Check existing items
  const { count } = await sb.from('inventario_items').select('*', { count: 'exact', head: true });
  if (count > 0) {
    log(`⚠️  Ya existen ${count} ítems en la tabla. Abortando para evitar duplicados.`, 'warn');
    log('Si deseas reimportar, elimina los registros desde inventario.html primero.', 'warn');
    btn.disabled = false;
    return;
  }

  // Insert items in batches of 20
  log(`Insertando ${ITEMS.length} ítems...`);
  for (let i = 0; i < ITEMS.length; i += 20) {
    const batch = ITEMS.slice(i, i + 20);
    const { error } = await sb.from('inventario_items').insert(batch);
    if (error) { log(`❌ Error en ítems batch ${i}: ${error.message}`, 'err'); btn.disabled = false; return; }
    log(`  ✓ ${Math.min(i + 20, ITEMS.length)}/${ITEMS.length} ítems`, 'ok');
  }

  // Insert EPP
  if (MOVS_EPP.length) {
    log(`Insertando ${MOVS_EPP.length} entregas EPP...`);
    const { error } = await sb.from('inventario_movimientos').insert(MOVS_EPP);
    if (error) { log(`❌ Error entregas EPP: ${error.message}`, 'err'); btn.disabled = false; return; }
    log(`  ✓ ${MOVS_EPP.length} entregas EPP`, 'ok');
  }

  // Insert salidas
  if (MOVS_SAL.length) {
    log(`Insertando ${MOVS_SAL.length} salidas insumos...`);
    const { error } = await sb.from('inventario_movimientos').insert(MOVS_SAL);
    if (error) { log(`❌ Error salidas: ${error.message}`, 'err'); btn.disabled = false; return; }
    log(`  ✓ ${MOVS_SAL.length} salidas`, 'ok');
  }

  log('\n✅ Importación completa. Puedes cerrar esta página y volver a inventario.html', 'ok');
  btn.textContent = '✅ Completado';
}
