name: Keep Supabase Alive

# Los proyectos Supabase en plan Free se pausan tras ~7 días sin actividad.
# Este workflow hace una consulta minima cada pocos dias para evitar la pausa.
on:
  schedule:
    - cron: '0 12 * * 1,4' # todos los lunes y jueves a las 12:00 UTC
  workflow_dispatch: # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar Supabase para mantenerlo activo
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/inventario_items?select=id&limit=1")
          echo "Respuesta HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Supabase respondió con error $HTTP_CODE"
            exit 1
          fi
